name: Notion to GitHub Sync

on:
  schedule:  # 定时触发
    - cron: "0 0 * * *"  # 每天 00:00 运行
  workflow_dispatch:  # 手动触发按钮

jobs:
  sync-notion:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境（需要用它来处理 Notion 数据）
      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: "3.9"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install notion-client markdown

      # 4. 拉取 Notion 数据并转换为 Markdown
      - name: Sync Notion to GitHub
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}  # Notion Token
          PAGE_ID: ${{ secrets.PAGE_ID }}               # Notion 页面 ID
        run: |
          python3 scripts/notion_sync.py

      # 5. 提交同步后的内容
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Sync Notion documents" || echo "No changes to commit"
          git push
