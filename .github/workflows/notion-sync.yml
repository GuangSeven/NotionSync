name: Sync Notion to Private Docs Repo

on:
  workflow_dispatch:  # 支持在 Actions 页面手动触发
  schedule:
    - cron: "0 * * * *"  # 每小时自动同步一次

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # 代码仓库只需读权限；目标仓库通过 PAT 写入

    steps:
      # 1. 检出当前代码仓库（获取同步脚本）
      - name: Checkout code repo
        uses: actions/checkout@v4
        with:
          path: code

      # 2. 检出目标私有文档仓库（接收导出文档）
      - name: Checkout target docs repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TARGET_REPO }}
          token: ${{ secrets.TARGET_PAT }}
          ref: ${{ secrets.TARGET_BRANCH }}
          path: target

      # 3. 配置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 4. 安装依赖
      - name: Install dependencies
        run: pip install notion-client

      # 5. 运行同步脚本，将 Notion 文档按层级结构导出到目标目录
      - name: Export Notion docs
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
          OUT_DIR: target/notion_export
        run: python code/scripts/notion_sync.py

      # 6. 将导出的文档提交并推送到目标私有仓库
      - name: Commit and push to target repo
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add notion_export
          git commit -m "sync: notion docs update $(date -u '+%Y-%m-%dT%H:%M:%SZ')" || echo "No changes to commit"
          git push origin ${{ secrets.TARGET_BRANCH }}
