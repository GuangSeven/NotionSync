name: Notion to GitHub Sync

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 00:00 UTC 自动同步
  workflow_dispatch:  # 支持手动触发

# 本代码仓库只需只读权限；向目标仓库写入通过 TARGET_PAT 完成
permissions:
  contents: read

jobs:
  sync-notion:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出本代码仓库（用于运行同步脚本）
      - name: Checkout code repository
        uses: actions/checkout@v4
        with:
          path: code-repo

      # 2. 检出目标私有文档仓库（用于接收导出文件）
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.TARGET_REPO }}
          token: ${{ secrets.TARGET_PAT }}
          path: target-repo

      # 3. 切换到目标分支（如不存在则创建）
      - name: Switch to target branch
        working-directory: target-repo
        run: |
          git fetch origin "${{ secrets.TARGET_BRANCH }}" || true
          git checkout "${{ secrets.TARGET_BRANCH }}" \
            || git checkout -b "${{ secrets.TARGET_BRANCH }}"

      # 4. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 5. 安装依赖
      - name: Install dependencies
        run: pip install notion-client

      # 6. 运行同步脚本，把导出文件写入目标仓库工作区
      - name: Sync Notion pages to target repo
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
          OUTPUT_DIR: ${{ github.workspace }}/target-repo
        run: python3 code-repo/scripts/notion_sync.py

      # 7. 提交并 push 到目标私有仓库（无变更时静默跳过）
      - name: Commit and push to target repository
        working-directory: target-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync Notion documents $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin "${{ secrets.TARGET_BRANCH }}"
          fi
